name: Terraform DevSecOps Demo

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
      - "scripts/**"
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
      - "scripts/**"

permissions:
  contents: read

jobs:
  validate-and-scan:
    name: Validate and Security Scan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init

      # Syntax Validierung, so wie ein Linter
      - name: Terraform validate
        run: terraform validate

      # Logische Validierung mit Checkov als Tool, um Security Concerns zu entdecken
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra
          framework: terraform
          quiet: true
          soft_fail: false

      - name: Terraform plan
        run: terraform plan -var-file=terraform.tfvars -out=tfplan

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infra/tfplan

  deploy:
    name: Deploy to AWS
    if: github.event_name == 'push'
    needs: validate-and-scan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -auto-approve -var-file=terraform.tfvars

      - name: Get health URL
        id: output
        run: |
          HEALTH_URL=$(terraform output -raw health_url)
          echo "health_url=$HEALTH_URL" >> $GITHUB_OUTPUT

      - name: Wait for service
        run: sleep 30

      - name: Smoke test
        run: ../scripts/smoke.sh "${{ steps.output.outputs.health_url }}"