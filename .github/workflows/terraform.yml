name: Terraform DevSecOps Demo

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
      - "scripts/**"
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
      - "scripts/**"

permissions:
  contents: read
  id-token: write

jobs:
  validate-and-scan:
    name: Validate and Security Scan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    env:
    # Bad Practice mit stat. Access Keys, jetzt lieber über OIDC
      # AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      # AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::004657932016:role/devsecops-deploy-role
          aws-region: ${{ env.AWS_DEFAULT_REGION }}
        
      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: tflint

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra
          framework: terraform
          output_format: sarif
          quiet: true
          soft_fail: false
          skip_check: CKV2_AWS_61,CKV2_AWS_62,CKV_AWS_144,CKV_AWS_145,CKV_AWS_18,CKV_AWS_260
      
      # - name: Run tfsec
      #   uses: aquasecurity/tfsec-action@v1.0.3
      #   with:
      #     working_directory: infra

      - name: Terraform plan
        run: terraform plan -var-file=terraform.tfvars -out=tfplan

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infra/tfplan

      - name: Install Conftest
        run: |
          curl -L https://github.com/open-policy-agent/conftest/releases/download/v0.45.0/conftest_0.45.0_Linux_x86_64.tar.gz | tar xz
          sudo mv conftest /usr/local/bin
      - name: Run policy checks
        run: conftest test infra

  deploy:
    name: Deploy to AWS
    if: github.event_name == 'push'
    needs: validate-and-scan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    env:
      # AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      # AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::004657932016:role/devsecops-deploy-role
          aws-region: ${{ env.AWS_DEFAULT_REGION }}
        
      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -auto-approve -var-file=terraform.tfvars

      - name: Get health URL
        id: output
        run: |
          HEALTH_URL=$(terraform output -raw health_url)
          echo "health_url=$HEALTH_URL" >> $GITHUB_OUTPUT

      - name: Wait for service
        run: sleep 30

      - name: Smoke test
        run: ../scripts/smoke.sh "${{ steps.output.outputs.health_url }}"